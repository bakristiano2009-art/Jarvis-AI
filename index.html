<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #001018 0%, #000000 70%);
    font-family: 'Orbitron', sans-serif;
    color: #00eaff;
    text-align: center;
}

h1 {
    margin-top: 40px;
    font-size: 44px;
    letter-spacing: 6px;
    text-shadow: 0 0 20px #00eaff;
}

button {
    background: transparent;
    border: 2px solid #00eaff;
    color: #00eaff;
    padding: 12px 30px;
    margin: 15px;
    font-size: 16px;
    letter-spacing: 2px;
    border-radius: 40px;
}

button:hover {
    background: #00eaff;
    color: black;
    box-shadow: 0 0 20px #00eaff;
}

#output {
    margin-top: 40px;
    padding: 20px;
    font-size: 18px;
    min-height: 120px;
    text-shadow: 0 0 10px #00eaff;
}
</style>
</head>

<body>

<h1>J.A.R.V.I.S</h1>

<button onclick="startListening()">ACTIVATE</button>
<button onclick="clearMemory()">RESET MEMORY</button>

<div id="output"></div>

<script>

let recognition;

function startListening() {
    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";
    recognition.start();

    recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        document.getElementById("output").innerHTML = "You: " + transcript;
        askJarvis(transcript);
    };
}

function clearMemory() {
    localStorage.removeItem("jarvisMemory");
    document.getElementById("output").innerHTML = "Memory cleared.";
}

async function askJarvis(prompt) {

    let memory = JSON.parse(localStorage.getItem("jarvisMemory")) || [];

    memory.push({ role: "user", content: prompt });

    try {
        const response = await fetch("https://jarvis-backend-mixd.onrender.com/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ messages: memory })
        });

        const data = await response.json();

        const reply = data.reply;

        memory.push({ role: "assistant", content: reply });
        localStorage.setItem("jarvisMemory", JSON.stringify(memory));

        document.getElementById("output").innerHTML += "<br><br>Jarvis: " + reply;

    } catch (error) {
        document.getElementById("output").innerHTML += "<br>Error connecting to AI.";
    }
}

</script>

</body>
</html>
